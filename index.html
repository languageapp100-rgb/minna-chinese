<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みんなの中国語 - 使えるフレーズを身につけよう</title>
  <meta name="description" content="リアルな中国語会話を学ぶためのフレーズ集＆クイズアプリ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
  <div id="splash-screen">
    <div class="splash-content">
      <img src="/img/logo.png" alt="みんなの中国語" class="splash-logo" />
      <h1 class="splash-title">みんなの中国語</h1>
      <div class="splash-loader"></div>
    </div>
  </div>

  <div id="achievement-overlay" class="hidden">
    <div class="achievement-card">
      <img id="achievement-img" src="" alt="Badge" />
      <h3 id="achievement-title"></h3>
      <p id="achievement-desc"></p>
      <button class="btn-primary"
        onclick="document.getElementById('achievement-overlay').classList.add('hidden')">すごい！</button>
    </div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
